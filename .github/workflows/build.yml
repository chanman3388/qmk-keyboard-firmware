name: Build QMK

on:
  workflow_dispatch:
  push:
    branches:
      - main


jobs:
  build_the_firmware:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set release tag
        run: |
          echo "TAG=`date --rfc-3339=date`" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-avr avr-libc gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set QMK_HOME
        run: echo "QMK_HOME=${HOME}/qmk_firmware" >> $GITHUB_ENV

      - name: Cache QMK firmware
        uses: actions/cache@v4
        id: qmk-cache
        with:
          path: ~/qmk_firmware
          key: qmk-firmware-${{ runner.os }}

      - name: Install QMK
        run: pip install --user qmk

      - name: Setup QMK
        if: steps.qmk-cache.outputs.cache-hit != 'true'
        run: qmk setup -y

      - name: Update QMK
        if: steps.qmk-cache.outputs.cache-hit == 'true'
        run: |
          cd $QMK_HOME
          git pull
      
      - name: Setup keyboards
        run: |
          rm -rd $QMK_HOME/keyboards/*
          cp -r $GITHUB_WORKSPACE/* $QMK_HOME/keyboards/.

      - name: Qmk Lint
        run: |
          qmk lint -kb 3w6
          qmk lint -kb charybdis_nano/elitec

      - name: Build 3w6
        run: qmk compile -kb 3w6 -km default

      - name: Build charybdis_nano elite c default
        run: qmk compile -kb charybdis_nano/elitec -km default

      - name: Build charybdis_nano rp2040 default
        run: qmk compile -kb charybdis_nano/rp2040 -km default

      - name: Build charybdis_nano rp2040 qwerty
        run: qmk compile -kb charybdis_nano/rp2040 -km qwerty
          
      - name: Build cornerp
        run: qmk compile -kb cornerp -km default

      - name: Build dasbob
        run: qmk compile -kb dasbob -km halmak

      - name: Build sofle
        run: qmk compile -kb sofle -km rgb_with_ind_halmak 
      
      - name: Get git short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TAG }}-${{ env.SHORT_SHA }}
          path: |
            ${{ env.QMK_HOME }}/*.hex
            ${{ env.QMK_HOME }}/*.bin
            ${{ env.QMK_HOME }}/*.uf2
